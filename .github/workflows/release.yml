name: Release

# Build and publish the package to PyPI when a version tag is pushed, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build           # pure-Python; no torch needed to build
      - name: Check metadata
        run: |
          pip install twine
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # PyPI Trusted Publishing (OIDC) — no API token/secret to manage. Configure a
    # trusted publisher for this repo+workflow at https://pypi.org/manage/account/publishing/
    environment:
      name: pypi
      url: https://pypi.org/p/silogic
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
